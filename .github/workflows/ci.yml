name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Zero runtime dependencies: the suite runs on Node's built-in test runner,
      # so there's nothing to install.
      - name: Run tests
        run: node --test
